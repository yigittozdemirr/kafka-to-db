global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'kafka-consumers'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['app1:8080', 'app2:8080', 'app3:8080']

  - job_name: 'kafka-producer'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['producer-app:8085']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'kafka'
    static_configs:
      - targets: [ 'kafka-exporter:9308' ]